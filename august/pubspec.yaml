name: august
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.4

environment:
  sdk: '>=3.3.1 <4.0.0'

dependencies:
  avatar_glow: ^3.0.1
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  http: ^1.1.0
  json_annotation: ^4.0.1
  provider:
  sizer: ^2.0.15
  flutter_svg:
  colorful_safe_area:
  dynamic_timeline: ^0.1.2 
  dots_indicator:
  flutter_keyboard_visibility: 
  custom_navigation_bar:
  animations:
  skeleton_text: 
  card_swiper:
  shared_preferences:
  animated_digit:
  persistent_bottom_nav_bar:
  dropdown_search:
  google_nav_bar:
  qr_flutter:
  pull_down_button:
  image_picker:
  path_provider:
  flutter_feather_icons: ^2.0.0
  modal_bottom_sheet: ^3.0.0-pre
  animated_text_kit:
  permission_handler:
  flutter_native_contact_picker: ^0.0.5
  contacts_service: ^0.6.1
  auth_buttons:
  google_sign_in: ^6.2.1
  shimmer:
  flutter_animated_button: ^2.0.3
  flutter_animated_icons: ^1.0.1
  flutter_bouncing_widgets: ^1.0.3
  flutter_slidable: ^3.1.0
  gaimon: ^1.2.2+2
  image_cropper: ^6.0.0
  internet_connection_checker: ^1.0.0+1
  animated_hint_textfield: ^1.0.1
  intl: ^0.19.0
  page_view_dot_indicator: ^2.3.0
  sliding_number: ^0.0.4
  url_launcher: ^6.2.5

flutter:
  fonts:
    - family: Apple
      fonts:
        - asset: assets/fonts/SF-Pro-Rounded-Light.ttf
        - asset: assets/fonts/SF-Pro-Rounded-Medium.ttf
          weight: 200
  assets:
  - assets/icons/horizontal-bar.svg
  - assets/icons/memoji.png
  - assets/icons/option.svg
  - assets/icons/semester.svg
  - assets/icons/grade.svg
  - assets/icons/major.svg
  - assets/icons/univ.svg
  - assets/icons/profile.svg


  uses-material-design: true
